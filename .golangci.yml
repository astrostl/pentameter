version: "2"
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - dogsled
    - dupl
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - ineffassign
    - interfacebloat
    - lll
    - loggercheck
    - maintidx
    - makezero
    - misspell
    - mnd
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - testableexamples
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - zerologlint
  settings:
    cyclop:
      max-complexity: 15
    depguard:
      rules:
        main:
          deny:
            - pkg: log/slog
              desc: use standard log for now
    dupl:
      threshold: 100
    funlen:
      lines: 100
      statements: 50
    gocognit:
      min-complexity: 15
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    govet:
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
    interfacebloat:
      max: 8
    lll:
      line-length: 160
    maintidx:
      under: 10
    misspell:
      locale: US
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-functions:
        - fmt.Sprintf
        - time.Now
    nestif:
      min-complexity: 5
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
    varnamelen:
      min-name-length: 2
      ignore-names:
        - i
        - j
        - k
        - t
        - w
        - r
        - id
        - ok
        - err
    wrapcheck:
      ignore-sigs:
        - fmt.Errorf(
        - errors.New(
        - errors.Unwrap(
        - .Wrap(
        - .Wrapf(
      # Our own sub-packages are not "external"; wrapcheck targets third-party deps.
      ignore-package-globs:
        - github.com/astrostl/pentameter/*
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - cyclop
          - funlen
          - goconst
          - gocognit
          - gocyclo
          - mnd
          - nestif
          - varnamelen
        path: _test\.go
      - linters:
          - gosec
        text: 'G114: Use of net/http serve function that has no support for setting timeouts'
        source: http.ListenAndServe.*8080
      - linters:
          - bodyclose
        text: response body must be closed
        source: websocket.DefaultDialer.Dial
      - linters:
          - promlinter
        text: use base unit "celsius" instead of "fahrenheit"
      - linters:
          - varnamelen
        text: variable name '.*' is too short
        source: for.*range
      - linters:
          - revive
        text: exported function.*should have comment
        source: func.*main
      - linters:
          - revive
        text: unused-parameter
        source: func.*Handler
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(pentameter)
    goimports:
      local-prefixes:
        - pentameter
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
